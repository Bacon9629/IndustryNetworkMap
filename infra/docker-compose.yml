services:
  neo4j:
    image: neo4j:5.26-community
    container_name: industry-network-map-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-industrymap_dev}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j:/import/cypher:ro
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
